# Example MANIFEST.yaml for exp-report plugin
# Demonstrates: canonical fields, alternative field names, missing figures,
# superseded experiments, and various experiment statuses.
#
# Usage: Copy this file to your project's outputs/ or root directory,
# then run /exp-report:exp-report

version: 1
experiments:
  e001:
    path: data/E001/
    status: final
    description: "Baseline pipeline validation with default parameters"
    findings: "AUC 0.85 (95% CI: 0.81-0.89) on holdout test set. Pipeline runs end-to-end in 45 minutes."
    outputs:
      - data/E001/figures/roc_curve.png
      - data/E001/figures/confusion_matrix.png

  e002:
    path: data/E002/
    status: final
    description: "Feature selection comparison: Lasso vs Random Forest importance"
    findings: "Lasso selected 12 features (AUC 0.87), RF selected 18 features (AUC 0.86). Lasso preferred for parsimony."
    outputs:
      - data/E002/figures/feature_importance.png
    notes: "Retroactive: uses pipeline from E001 as baseline"

  e003:
    path: data/E003/
    status: experimental
    description: "Early exploration of deep learning approach"
    findings: "Inconclusive — training unstable with small dataset"

  e004:
    path: data/E004/
    status: final
    # Alternative field names (plugin normalizes these)
    title: "Cross-validation stability analysis"
    result: "10-fold CV mean AUC 0.84 (std 0.03). No fold below 0.78. Results are stable."
    outputs:
      - data/E004/figures/cv_boxplot.png

  e005:
    path: data/E005/
    status: final
    description: "Sub-class analysis: performance by category"
    findings: "Class A: AUC 0.91, Class B: AUC 0.79, Class C: AUC 0.82. Class B underperforms due to low sample size (n=23)."
    outputs:
      - data/E005/figures/per_class_roc.png
      - data/E005/figures/sample_size_vs_auc.png

  e006:
    path: data/E006/
    status: final
    description: "Dose-response relationship for concentration parameter"
    findings: "Non-linear dose-response confirmed (p=0.003). EC50 = 2.4 uM. Plateau above 10 uM."
    outputs:
      - data/E006/figures/dose_response_curve.png
    notes: "Superseded by E007 for updated EC50 estimate"

  e007:
    path: data/E007/
    status: final
    description: "Updated dose-response with expanded concentration range"
    findings: "Revised EC50 = 2.1 uM (95% CI: 1.8-2.5). Hill coefficient = 1.3. Plateau confirmed at 8 uM."
    outputs:
      - data/E007/figures/dose_response_v2.png
      - data/E007/figures/hill_fit.png

  # Experiment with no figures (edge case)
  e008:
    path: data/E008/
    status: final
    description: "Statistical power analysis for primary endpoint"
    findings: "Minimum detectable effect size = 0.15 AUC at 80% power with n=150. Current dataset (n=200) is adequately powered."

  # Experiment with bare filename outputs (edge case)
  e009:
    path: data/E009/
    status: final
    description: "Method comparison: logistic regression vs gradient boosting"
    findings: "GBM AUC 0.88 vs LR AUC 0.85 (p=0.12, not significant). GBM preferred for 3% practical improvement."
    outputs:
      - comparison_table.png
